<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" fill="none">
  <defs>
    <linearGradient id="hybrid-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Mark - Abstract H with connection nodes -->
  <g transform="translate(5, 10)">
    <!-- H shape -->
    <path d="M8 12v26M8 25h16M24 12v26" stroke="url(#hybrid-gradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Connection nodes -->
    <circle cx="8" cy="12" r="3" fill="url(#hybrid-gradient)"/>
    <circle cx="8" cy="38" r="3" fill="url(#hybrid-gradient)"/>
    <circle cx="24" cy="12" r="3" fill="url(#hybrid-gradient)"/>
    <circle cx="24" cy="38" r="3" fill="url(#hybrid-gradient)"/>
    <circle cx="16" cy="25" r="2" fill="url(#hybrid-gradient)"/>
  </g>
  
  <!-- Text -->
  <text x="48" y="38" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="white">
    Hybrid<tspan fill="url(#hybrid-gradient)">Hub</tspan>
  </text>
</svg>
